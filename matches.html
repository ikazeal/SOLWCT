<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matches</title>
    <meta name="description" content="WorldCup Token (WCT) · Full schedule and match predictions." />
    <meta name="theme-color" content="#070411" />
    <meta name="wct-backend" content="" />
    <meta name="wct-treasury" content="0x59cdafe58de6cdabf46900aff2d431d98e1c8503" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css?v=20260516" />
  </head>
  <body data-page="matches">
    <div class="bg">
      <div class="bg__vignette"></div>
      <div class="bg__lights"></div>
      <div class="bg__sparkles"></div>
    </div>

    <header class="topbar">
      <div class="container topbar__inner">
        <a class="brand" href="./index.html" aria-label="WorldCup Token">
          <span class="brand__mark" aria-hidden="true">
            <img class="brand__markImg" src="./hero-bg.png.png" alt="" loading="eager" decoding="async" />
          </span>
          <span class="brand__text">
            <span class="brand__title">WORLDCUP</span>
            <span class="brand__subtitle">TOKEN</span>
          </span>
        </a>

        <div class="topbar__actions">
          <button id="langToggleBtn" class="btn btn--ghost btn--lang" type="button" aria-label="Language">
            <span id="langBtnLabel">EN</span>
          </button>
          <a class="iconBtn" href="https://x.com/WCTFLAP" target="_blank" rel="noreferrer" aria-label="Twitter / X">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M18.9 3H22l-6.8 7.8L23.1 21H17l-4.8-6.2L6.8 21H3.7l7.3-8.4L1 3h6.3l4.3 5.6L18.9 3Z" fill="currentColor"/>
            </svg>
          </a>
          <div class="walletMenuWrap">
            <button id="connectWalletBtn" class="btn btn--ghost" type="button" aria-haspopup="menu" aria-expanded="false">
              <span class="btn__icon" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M21 7.5V6.25C21 5.01 19.99 4 18.75 4H5.25C4.01 4 3 5.01 3 6.25V17.75C3 18.99 4.01 20 5.25 20H18.75C19.99 20 21 18.99 21 17.75V16.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                  <path d="M15 12h6v4.5c0 1.1-.9 2-2 2h-4v-8.5c0-1.1.9-2 2-2h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M18 14a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" fill="currentColor"/>
                </svg>
              </span>
              <span id="walletBtnLabel" data-i18n="wallet.connect">CONNECT WALLET</span>
            </button>
            <div id="walletMenu" class="walletMenu" role="menu" hidden>
              <button id="myPredictionsBtn" class="btn btn--ghost walletMenu__item" type="button" role="menuitem" data-i18n="wallet.myPredictions">MY PREDICTIONS</button>
              <button id="disconnectWalletBtn" class="btn btn--ghost btn--disconnect walletMenu__item" type="button" role="menuitem" data-i18n="wallet.disconnect">DISCONNECT</button>
            </div>
          </div>
          <a class="btn btn--ghost" href="./whitepaper.html" data-i18n="nav.whitepaper">WHITEPAPER</a>
          <a class="btn btn--ghost" href="./index.html" data-i18n="matches.backHome">BACK</a>
        </div>
      </div>
    </header>

    <main class="main">
      <section class="container matchesPage">
        <div class="matchesHead">
          <div class="matchesHead__title" data-i18n="matches.allTitle">ALL MATCHES</div>
          <div class="matchesHead__hint" data-i18n="matches.hint">Filter by stage · View by date</div>
          <div class="matchesHead__tabs" id="matchesStageTabs"></div>
        </div>
        <div id="allMatches" class="allMatchesHost"></div>
      </section>
    </main>

    <div class="modal" id="matchesPredictModal" aria-hidden="true">
      <div class="modal__backdrop" data-close="matchPredict"></div>
      <div class="modal__panel" role="dialog" aria-modal="true" aria-label="Prediction">
        <div class="modal__head">
          <div class="modal__title" data-i18n="matches.predictTitle">MATCH PREDICTION</div>
          <button class="iconBtn" type="button" data-close="matchPredict" aria-label="Close">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M18 6L6 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <path d="M6 6L18 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
        <div class="modal__body">
          <div id="matchesPredictBody"></div>
          <div class="modal__hint" id="matchesPredictHint" data-i18n="prediction.hintDisconnected">Connect wallet to submit predictions.</div>
        </div>
      </div>
    </div>

    <div class="toastHost" id="toastHost" aria-live="polite" aria-relevant="additions"></div>
    <script src="./app.js?v=20260516"></script>
  </body>
</html>
